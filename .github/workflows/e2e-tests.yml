name: Cypress E2E

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  cypress-e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: m3_bank
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PORT: 3334
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: m3_bank
      JWT_SECRET: m3-bank-ci-secret
      APP_TIMEZONE: America/Sao_Paulo
      NEXT_PUBLIC_API_URL: http://localhost:3334/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install monorepo dependencies
        run: npm ci

      - name: Install QA dependencies
        run: npm ci
        working-directory: packages/tests

      - name: Seed database
        run: npm run seed

      - name: Start API
        run: npm run dev:api > api.log 2>&1 &

      - name: Start Web
        run: npm run dev:web > web.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3334/health >/dev/null && curl -fsS http://localhost:3000 >/dev/null && exit 0
            sleep 2
          done
          echo "Services did not become ready in time"
          cat api.log || true
          cat web.log || true
          exit 1

      - name: Run Cypress E2E
        run: npm --prefix packages/tests run test:e2e

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: packages/tests/ui/cypress/screenshots
          if-no-files-found: ignore

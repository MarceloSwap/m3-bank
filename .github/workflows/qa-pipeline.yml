name: QA Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Install API dependencies
        run: npm --workspace packages/api ci
      - name: Run API (basic check)
        run: npm --workspace packages/api run dev &
        sleep 5
        kill %1 || true

  test-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Install Web dependencies
        run: npm --workspace packages/web ci
      - name: Build Web
        run: npm --workspace packages/web run build